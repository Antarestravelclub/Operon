<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Logbook — Split Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  @page { size: 3.74in 8.27in; margin: 0; }

  body {
    margin: 0; padding: 0;
    font-family: 'Inter', sans-serif;
  }

  .page {
    width: 3.74in;
    height: 8.27in;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Navy top half */
  .top-half {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 52%;
    background: #0F2B46;
    clip-path: polygon(0 0, 100% 0, 100% 80%, 0 100%);
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 20px;
  }

  /* Teal bottom half */
  .bottom-half {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 52%;
    background: #1BA8D8;
    clip-path: polygon(0 20%, 100% 0, 100% 100%, 0 100%);
    z-index: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding: 0 20px 24px;
  }

  .anchor-icon {
    font-size: 44px;
    color: #fff;
    line-height: 1;
    margin-bottom: 12px;
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 30px;
    color: #fff;
    text-align: center;
    letter-spacing: 1px;
  }

  .tagline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 14px;
    color: #fff;
    text-align: center;
    margin-top: 14px;
    letter-spacing: 0.5px;
    opacity: 0.95;
  }

  /* QR circle centered on the diagonal */
  .qr-circle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    width: 110px;
    height: 110px;
    background: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    padding: 10px;
  }

  .qr-circle #qr {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .domain {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: #fff;
    text-align: center;
    letter-spacing: 0.5px;
  }

  /* Decorative thin line on the diagonal */
  .diagonal-line {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 2;
    pointer-events: none;
  }

  .diagonal-line::after {
    content: '';
    position: absolute;
    top: 44%;
    left: -10%;
    width: 120%;
    height: 2px;
    background: rgba(255,255,255,0.3);
    transform: rotate(-8deg);
    transform-origin: center;
  }

  .print-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(255,255,255,0.2);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 8px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    z-index: 10;
  }

  @media print {
    body { margin: 0; padding: 0; }
    .page { width: 3.74in; height: 8.27in; }
    .no-print { display: none; }
  }
</style>
</head>
<body>
<div class="page">
  <button class="print-btn no-print" onclick="window.print()">Print</button>

  <!-- Navy top -->
  <div class="top-half">
    <div class="anchor-icon">⚓</div>
    <div class="brand">My Logbook</div>
  </div>

  <!-- Teal bottom -->
  <div class="bottom-half">
    <div class="tagline">Track it once. Save thousands.</div>
    <div class="domain" style="margin-top: 16px;">my-logbook.io</div>
  </div>

  <!-- Diagonal decorative line -->
  <div class="diagonal-line"></div>

  <!-- QR centered on diagonal -->
  <div class="qr-circle">
    <div id="qr"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script>
  var qr = qrcode(0, 'M');
  qr.addData('https://my-logbook.io');
  qr.make();
  document.getElementById('qr').innerHTML = qr.createSvgTag({cellSize: 2, margin: 0, scalable: true});
</script>
</body>
</html>
