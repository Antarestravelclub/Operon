<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=3.74in, initial-scale=1.0">
<title>My Logbook — Your Boat Is A Money Pit</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  @page { size: 3.74in 8.27in; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 3.74in;
    height: 8.27in;
    overflow: hidden;
    background: #0F2B46;
    color: #FFFFFF;
    font-family: 'Inter', sans-serif;
  }
  .page {
    width: 3.74in;
    height: 8.27in;
    padding: 0.28in 0.3in 0.25in;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 28px;
    line-height: 1.05;
    letter-spacing: -0.5px;
    color: #FFFFFF;
    text-transform: uppercase;
    margin-bottom: 0.12in;
  }
  .subhead {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: #1BA8D8;
    margin-bottom: 0.2in;
  }
  .stats-box {
    background: #FFFFFF;
    border-radius: 8px;
    padding: 0.18in 0.16in;
    margin-bottom: 0.15in;
  }
  .stat {
    font-family: 'Inter', sans-serif;
    font-size: 10.5px;
    line-height: 1.45;
    color: #0F2B46;
    font-weight: 500;
    padding: 0.05in 0;
    border-bottom: 1px solid #e0e6ec;
  }
  .stat:last-child { border-bottom: none; }
  .stat strong { font-weight: 700; }
  .divider {
    width: 100%;
    height: 2px;
    background: #1BA8D8;
    margin: 0.1in 0;
  }
  .brand {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 16px;
    color: #FFFFFF;
    margin-bottom: 0.03in;
  }
  .tagline {
    font-family: 'Inter', sans-serif;
    font-style: italic;
    font-weight: 500;
    font-size: 11px;
    color: #1BA8D8;
    margin-bottom: 0.12in;
  }
  .qr-section {
    display: flex;
    align-items: center;
    gap: 0.12in;
  }
  #qr { flex-shrink: 0; }
  #qr svg { display: block; }
  .scan-text {
    font-size: 9px;
    color: #1BA8D8;
    font-weight: 500;
    line-height: 1.4;
  }
  .domain {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 12px;
    color: #1BA8D8;
    text-align: center;
    margin-top: 0.08in;
  }
  .no-print { display: none; }
  @media print {
    .no-print { display: none !important; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="top">
    <h1>Your Boat<br>Is a Money<br>Pit</h1>
    <div class="subhead">And you're not even tracking it.</div>
    <div class="stats-box">
      <div class="stat"><strong>$2,500+</strong> average cost of missed maintenance</div>
      <div class="stat"><strong>68%</strong> of boat owners don't track service intervals</div>
      <div class="stat"><strong>42%</strong> can't find their maintenance records when selling</div>
    </div>
  </div>
  <div class="bottom">
    <div class="divider"></div>
    <div class="brand">My Logbook ⚓</div>
    <div class="tagline">Track it once. Save thousands.</div>
    <div class="qr-section">
      <div id="qr"></div>
      <div class="scan-text">Scan to<br>start free</div>
    </div>
    <div class="domain">my-logbook.io</div>
  </div>
</div>
<button class="no-print" onclick="window.print()">Print</button>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script>
  var qr = qrcode(0,'M'); qr.addData('https://my-logbook.io'); qr.make();
  document.getElementById('qr').innerHTML = qr.createSvgTag({cellSize:3,margin:1,scalable:true});
</script>
</body>
</html>
