<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Logbook — Minimalist Type</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  @page { size: 3.74in 8.27in; margin: 0; }

  body {
    margin: 0; padding: 0;
    font-family: 'Inter', sans-serif;
    background: #fff;
  }

  .page {
    width: 3.74in;
    height: 8.27in;
    background: #fff;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Huge brand text */
  .brand-block {
    padding-top: 70px;
    text-align: center;
    width: 100%;
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 42px;
    color: #0F2B46;
    line-height: 1.05;
    letter-spacing: -0.5px;
  }

  .brand .my {
    display: block;
    font-size: 36px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  /* Thin teal divider */
  .divider {
    width: 80px;
    height: 2px;
    background: #1BA8D8;
    margin: 28px auto 0;
  }

  /* Anchor */
  .anchor {
    font-size: 28px;
    color: #1BA8D8;
    margin-top: 24px;
    line-height: 1;
  }

  /* Tagline */
  .tagline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 14px;
    color: #0F2B46;
    text-align: center;
    margin-top: 16px;
    letter-spacing: 0.3px;
  }

  /* Categories */
  .categories {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 500;
    color: #0F2B46;
    text-align: center;
    margin-top: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.6;
  }

  /* QR section */
  .qr-section {
    margin-top: auto;
    margin-bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 36px;
  }

  #qr {
    background: #fff;
  }

  .domain {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: #0F2B46;
    margin-top: 14px;
    letter-spacing: 0.5px;
  }

  .print-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(15,43,70,0.08);
    color: #0F2B46;
    border: 1px solid rgba(15,43,70,0.15);
    border-radius: 4px;
    padding: 3px 8px;
    font-size: 8px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    z-index: 10;
  }

  @media print {
    body { margin: 0; padding: 0; }
    .page { width: 3.74in; height: 8.27in; }
    .no-print { display: none; }
  }
</style>
</head>
<body>
<div class="page">
  <button class="print-btn no-print" onclick="window.print()">Print</button>

  <!-- Huge brand text -->
  <div class="brand-block">
    <div class="brand">
      <span class="my">My</span>
      Logbook
    </div>
  </div>

  <!-- Divider -->
  <div class="divider"></div>

  <!-- Anchor -->
  <div class="anchor">⚓</div>

  <!-- Tagline -->
  <div class="tagline">Track it once. Save thousands.</div>

  <!-- Categories -->
  <div class="categories">Boats · Motorcycles · RVs</div>

  <!-- QR section -->
  <div class="qr-section">
    <div id="qr"></div>
    <div class="domain">my-logbook.io</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script>
  var qr = qrcode(0, 'M');
  qr.addData('https://my-logbook.io');
  qr.make();
  document.getElementById('qr').innerHTML = qr.createSvgTag({cellSize: 3, margin: 1, scalable: true});
</script>
</body>
</html>
