<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=3.74in, initial-scale=1.0">
<title>My Logbook — Track Every Dollar. Every Hour. Every Mile.</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  @page { size: 3.74in 8.27in; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 3.74in;
    height: 8.27in;
    overflow: hidden;
    background: #FFFFFF;
    color: #0F2B46;
    font-family: 'Inter', sans-serif;
  }
  .page {
    width: 3.74in;
    height: 8.27in;
    padding: 0.3in 0.32in 0.25in;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 28px;
    line-height: 1.08;
    letter-spacing: -0.5px;
    color: #0F2B46;
    text-transform: uppercase;
    padding-bottom: 0.08in;
  }
  .rule {
    width: 100%;
    height: 3px;
    background: #1BA8D8;
    margin: 0.12in 0 0.2in;
  }
  .columns {
    display: flex;
    gap: 0.08in;
    margin-bottom: 0.15in;
  }
  .col {
    flex: 1;
    text-align: center;
  }
  .col .number {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: #0F2B46;
    margin-bottom: 0.02in;
  }
  .col .label {
    font-size: 9px;
    font-weight: 600;
    color: #1BA8D8;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .vehicles {
    font-size: 10px;
    font-weight: 500;
    color: #0F2B46;
    text-align: center;
    margin-bottom: 0.08in;
    letter-spacing: 1px;
  }
  .divider {
    width: 100%;
    height: 1px;
    background: #0F2B46;
    opacity: 0.2;
    margin: 0.06in 0;
  }
  .brand {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 16px;
    color: #0F2B46;
    margin-bottom: 0.02in;
  }
  .tagline {
    font-family: 'Inter', sans-serif;
    font-style: italic;
    font-weight: 500;
    font-size: 11px;
    color: #0F2B46;
    margin-bottom: 0.12in;
  }
  .qr-section {
    display: flex;
    align-items: center;
    gap: 0.12in;
  }
  #qr { flex-shrink: 0; }
  #qr svg { display: block; }
  .scan-text {
    font-size: 9px;
    color: #0F2B46;
    font-weight: 500;
    line-height: 1.4;
  }
  .domain {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 12px;
    color: #0F2B46;
    text-align: center;
    margin-top: 0.06in;
  }
  .no-print { display: none; }
  @media print { .no-print { display: none !important; } }
</style>
</head>
<body>
<div class="page">
  <div class="top">
    <h1>Track Every Dollar. Every Hour. Every Mile.</h1>
    <div class="rule"></div>
    <div class="columns">
      <div class="col">
        <div class="number">$7.99</div>
        <div class="label">/mo Captain's</div>
      </div>
      <div class="col">
        <div class="number">3</div>
        <div class="label">vehicles Fleet</div>
      </div>
      <div class="col">
        <div class="number">Offline</div>
        <div class="label">PWA App</div>
      </div>
    </div>
    <div class="vehicles">Boats · Motorcycles · RVs</div>
  </div>
  <div class="bottom">
    <div class="divider"></div>
    <div class="brand">My Logbook ⚓</div>
    <div class="tagline">Track it once. Save thousands.</div>
    <div class="qr-section">
      <div id="qr"></div>
      <div class="scan-text">Scan to<br>start free</div>
    </div>
    <div class="domain">my-logbook.io</div>
  </div>
</div>
<button class="no-print" onclick="window.print()">Print</button>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script>
  var qr = qrcode(0,'M'); qr.addData('https://my-logbook.io'); qr.make();
  document.getElementById('qr').innerHTML = qr.createSvgTag({cellSize:3,margin:1,scalable:true});
</script>
</body>
</html>
